version: "3.8"

services:
  hr-agent:
    build: .
    container_name: universal-hr-agent
    ports:
      - "5000:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - agents-net

networks:
  agents-net:
    external: true
